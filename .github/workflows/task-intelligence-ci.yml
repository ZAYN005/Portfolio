name: Task Intelligence CI

on:
  push:
    branches: [main]
    paths:
      - task-intelligence/**
      - .github/workflows/task-intelligence-ci.yml
  pull_request:
    branches: [main]
    paths:
      - task-intelligence/**
      - .github/workflows/task-intelligence-ci.yml
  workflow_dispatch:

jobs:
  backend:
    name: Backend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: task-intelligence/backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: task-intelligence/backend/package-lock.json

      - name: Install dependencies
        run: |
          if [[ -f package-lock.json ]]; then
            npm ci
          else
            npm install
          fi

      - name: Run lint (if configured)
        run: npm run lint --if-present

      - name: Run tests (if configured)
        run: npm test --if-present

      - name: Build backend
        run: npm run build --if-present

  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: task-intelligence/frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: task-intelligence/frontend/package-lock.json

      - name: Install dependencies
        run: |
          if [[ -f package-lock.json ]]; then
            npm ci
          else
            npm install
          fi

      - name: Run lint (if configured)
        run: npm run lint --if-present

      - name: Run tests (if configured)
        run: npm test --if-present

      - name: Build frontend
        run: npm run build
